name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static security headers
        run: npm run security:headers

      - name: XSS regression tests
        run: npm run security:xss

      - name: Authorized feed safety tests
        run: npm run security:feeds

      - name: Secret scan
        run: npm run security:secrets

      - name: Dependency audit
        run: npm run security:audit

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/jium-ai"

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
