name: Desktop Release Candidate

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Redacted release channel label for readiness reporting
        required: true
        default: manual
      update_url:
        description: HTTPS generic updater endpoint used only for readiness validation
        required: true
        default: https://updates.invalid/jium-ai

permissions:
  contents: read

jobs:
  windows-release-candidate:
    runs-on: windows-latest
    env:
      JIUM_DESKTOP_RELEASE_CHANNEL: ${{ inputs.release_channel }}
      JIUM_DESKTOP_UPDATE_URL: ${{ inputs.update_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run security:secrets

      - name: Typecheck
        run: npm run typecheck

      - name: Desktop packaging tests
        run: npm test -- --run tests/desktopElectronMain.test.ts tests/desktopAppDir.test.ts tests/desktopPackageDir.test.ts tests/desktopDistribution.test.ts tests/desktopUpdateFeed.test.ts tests/desktopReleaseBundle.test.ts

      - name: Build unsigned desktop release candidate
        run: npm run desktop:package:dir

      - name: Build release candidate evidence bundle
        run: npm run desktop:release:bundle

      - name: Upload release candidate evidence
        uses: actions/upload-artifact@v6
        with:
          name: jium-ai-desktop-release-candidate-evidence
          path: dist/desktop-release-bundle
          if-no-files-found: error
          retention-days: 14

      - name: Upload unpacked desktop package
        uses: actions/upload-artifact@v6
        with:
          name: jium-ai-win-unpacked
          path: dist/desktop/win-unpacked
          if-no-files-found: error
          retention-days: 7
