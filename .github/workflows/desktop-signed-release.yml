name: Desktop Signed Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Approved desktop release channel
        required: true
        default: stable
      update_url:
        description: HTTPS generic updater endpoint
        required: true
      release_tag:
        description: Existing GitHub Release tag that matches package.json version
        required: true
        default: v0.3.95
      publish_to_github_release:
        description: Upload signed installer assets to the existing GitHub Release
        required: true
        type: boolean
        default: false
      publish_approval:
        description: Type APPROVED to allow release asset upload
        required: false
        default: ""

permissions:
  contents: read

jobs:
  windows-signed-release:
    runs-on: windows-latest
    env:
      JIUM_DESKTOP_RELEASE_CHANNEL: ${{ inputs.release_channel }}
      JIUM_DESKTOP_UPDATE_URL: ${{ inputs.update_url }}
      CSC_LINK: ${{ secrets.JIUM_WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.JIUM_WINDOWS_CSC_KEY_PASSWORD }}
      WINDOWS_SIGNING_CERT_SHA256: ${{ secrets.JIUM_WINDOWS_SIGNING_CERT_SHA256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run security:secrets

      - name: Signing secret preflight
        run: npm run desktop:signing-secrets:check

      - name: Release readiness
        run: npm run desktop:release:check

      - name: Build signed desktop package
        run: npm run desktop:package:signed

      - name: Validate desktop distribution
        run: npm run desktop:distribution:check

      - name: Validate update feed
        run: npm run desktop:update-feed:check -- --feed-dir ./dist/desktop

      - name: Build release evidence bundle
        run: npm run desktop:release:bundle

      - name: Build release evidence digests
        run: npm run desktop:release:digest-evidence -- --feed-dir ./dist/desktop

      - name: Build desktop publish candidate
        run: npm run desktop:publish:candidate -- --feed-dir ./dist/desktop

      - name: Upload signed desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jium-ai-windows-signed-desktop-artifacts
          path: |
            dist/desktop/*.exe
            dist/desktop/*.blockmap
            dist/desktop/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@v7
        with:
          name: jium-ai-windows-signed-release-evidence
          path: |
            dist/desktop-release-bundle
            dist/desktop-release-evidence-digests
            dist/desktop-publish-candidate
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    needs: windows-signed-release
    if: ${{ inputs.publish_to_github_release == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      JIUM_DESKTOP_RELEASE_TAG: ${{ inputs.release_tag }}
      JIUM_DESKTOP_PUBLISH_APPROVAL: ${{ inputs.publish_approval }}
      JIUM_DESKTOP_RELEASE_CHANNEL: ${{ inputs.release_channel }}
      JIUM_DESKTOP_UPDATE_URL: ${{ inputs.update_url }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download signed desktop artifacts
        uses: actions/download-artifact@v7
        with:
          name: jium-ai-windows-signed-desktop-artifacts
          path: dist/desktop

      - name: Download release evidence bundle
        uses: actions/download-artifact@v7
        with:
          name: jium-ai-windows-signed-release-evidence
          path: dist

      - name: Publish readiness gate
        run: npm run desktop:publish:check -- --feed-dir ./dist/desktop

      - name: Upload assets to existing GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$JIUM_DESKTOP_RELEASE_TAG" >/dev/null
          tar -czf dist/jium-ai-windows-signed-release-evidence.tgz -C dist desktop-release-bundle desktop-release-evidence-digests desktop-publish-candidate
          gh release upload "$JIUM_DESKTOP_RELEASE_TAG" \
            dist/desktop/*.exe \
            dist/desktop/*.blockmap \
            dist/desktop/latest.yml \
            dist/jium-ai-windows-signed-release-evidence.tgz \
            --clobber
